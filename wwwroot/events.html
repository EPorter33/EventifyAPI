<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events – Eventify</title>

    <!-- NHS Frontend CSS -->
    <link rel="stylesheet" href="https://unpkg.com/nhsuk-frontend@9.3.0/dist/nhsuk.min.css">
    <link rel="stylesheet" href="styles.css">

    <!-- NHS fonts -->
    <link rel="preload" href="https://assets.nhs.uk/fonts/FrutigerLTW01-55Roman.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://assets.nhs.uk/fonts/FrutigerLTW01-65Bold.woff2" as="font" type="font/woff2" crossorigin>

    <style>
        body {
            margin: 0;
            font-family: "Frutiger LT W01 55 Roman", Arial, sans-serif;
            background-color: #ffffff;
        }

        /* NHS banner */
        header.nhs-banner {
            background-color: #00a1e0;
            padding: 0.5rem 0;
        }

        header.nhs-banner .nhsuk-width-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nhs-banner-logo {
            height: 50px;
        }

        .banner-title {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 600;
            margin-left: 10px;
        }

        nav.nhs-nav {
            display: flex;
            gap: 20px;
        }

        nav.nhs-nav a {
            color: #ffffff;
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
        }

        nav.nhs-nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 900px;
            margin: 80px auto;
            padding: 0 20px;
        }

        h1.nhs-heading {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #005eb8;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table thead {
            background-color: #f3f3f3;
        }

        table th, table td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        table th {
            color: #005eb8;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        #noEvents {
            text-align: center;
            font-weight: 600;
            margin-top: 1rem;
        }

        footer {
            margin-top: 60px;
            background-color: #f3f3f3;
            padding: 20px 0;
            text-align: center;
            color: #212121;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- NHS-style top banner with logo and navigation -->
    <header class="nhs-banner" role="banner">
        <div class="nhsuk-width-container">
            <div style="display: flex; align-items: center;">
                <img src="https://assets.nhs.uk/images/nhs-logo.png" alt="NHS Logo" class="nhs-banner-logo">
                <h1 class="banner-title">Eventify (Cardiff)</h1>
            </div>

            <nav class="nhs-nav">
                <a href="index.html">Home</a>
                <a href="events.html" aria-current="page">Events</a>
                <a href="add-event.html">Create Event</a>
                <a href="about.html">About</a>
            </nav>
        </div>
    </header>

    <!-- Main content -->
    <main>
        <h1 class="nhs-heading">Events</h1>

        <!-- Event table -->
        <table id="eventsTable">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Date</th>
                    <th>Location</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamic events will populate here -->
            </tbody>
        </table>

        <p id="noEvents"></p>
    </main>

    <!-- Footer -->
    <footer>
        &copy; 2026 Eventify. All rights reserved.
    </footer>

    <script>
        async function loadEvents() {
            const response = await fetch('/api/events');
            const events = await response.json();

            const tbody = document.querySelector('#eventsTable tbody');
            const noEvents = document.getElementById('noEvents');
            tbody.innerHTML = '';
            noEvents.textContent = '';

            if (events.length === 0) {
                noEvents.textContent = 'No events found.';
                return;
            }

           events.forEach(ev => {
    const tr = document.createElement('tr');

    // Convert date to DD/MM/YYYY
    const eventDate = new Date(ev.date); // JS Date object
    const day = String(eventDate.getDate()).padStart(2, '0');
    const month = String(eventDate.getMonth() + 1).padStart(2, '0'); // months are 0-indexed
    const year = eventDate.getFullYear();
    const formattedDate = `${day}/${month}/${year}`;

    tr.innerHTML = `
        <td>${ev.title}</td>
        <td>${formattedDate}</td>
        <td>${ev.location}</td>
        <td>${ev.description || ''}</td>
    `;
    tbody.appendChild(tr);
}); 
        }

        loadEvents();
    </script>

</body>
</html>
